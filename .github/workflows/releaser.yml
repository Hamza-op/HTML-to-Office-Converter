name: Build & Release EXE

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Executable
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt
          playwright install chromium

      - name: Sanity Checks
        run: |
          python -m py_compile app.py converter.py quality_gate_pdf_to_pptx.py

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm HTML_to_Office_Converter.spec

      - name: Move & Rename EXE
        run: |
          Move-Item dist\HTML_to_Office_Converter.exe dist\HTML-to-Office-Converter.exe

      # Force-update the 'latest' tag to this commit, then upsert the release.
      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: |
            Automatically built from the latest commit on `main`.

            **Last updated:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.sha }}
          files: dist/HTML-to-Office-Converter.exe
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
