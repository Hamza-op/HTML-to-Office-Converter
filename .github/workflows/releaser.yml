name: Build & Release EXE

on:
  push:
    branches:
      - main
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Executable
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          playwright install chromium

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm HTML_to_Office_Converter.spec

      - name: List Output Files
        run: |
          dir dist

      - name: Upload Artifact to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: HTML-to-Office-Converter-Windows
          path: dist/HTML_to_Office_Converter.exe
          if-no-files-found: error

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HTML_to_Office_Converter.exe
          fail_on_unmatched_files: true
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || 'Latest Build (Main Branch)' }}
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
